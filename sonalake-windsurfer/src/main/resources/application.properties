server.port=8080

## Weatherbit API
weatherbit.api.base-url=https://api.weatherbit.io/v2.0
weatherbit.api.key=${WEATHERBIT_API_KEY:YOUR_API_KEY_HERE}
weatherbit.api.forecast-days=7
weatherbit.api.connect-timeout-ms=5000
weatherbit.api.read-timeout-ms=10000
## klucz : "9d646f6a564f40ed9d42afd4faa55adf"
## Caffeine cache: cache forecast responses for 1 hour
spring.cache.cache-names=forecasts
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=3600s

## Logging
logging.level.com.windsurfer=INFO
